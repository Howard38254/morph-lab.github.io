name: Sync ORCID Publications

on:
  schedule:
    # Run every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch publications from ORCID
        env:
          ORCID_ID: "0000-0002-8219-8983"
          OUTPUT: "_data/publications.json"
        run: python scripts/sync_orcid.py

      - name: Commit updated publications data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.json
          if git diff --cached --quiet; then
            echo "No changes to publications data."
          else
            git commit -m "chore: sync publications from ORCID [skip ci]"
            git push
          fi
