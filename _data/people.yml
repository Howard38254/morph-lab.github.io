pi:
  - name: "PI Name"
    role: "Principal Investigator"
    bio: >-
      Dr. Kevin Haughn is an Assistant Professor of Mechanical Engineering. 
      Kevin also volunteers as a pole vault coach for the RHIT track team. 
      He earned his doctorate in aerospace engineering at the University of Michigan, where his research focused 
      on using machine learning to develop controllers for autonomic morphing wings in a dynamic aerial environment.
      After defending his PhD, Kevin worked for the U.S. Army Research Laboratory, where his research incorporated 
      avian-inspired morphologies and control surface design to improve small aircraft maneuverability and adaptability.
    photo: /assets/images/people/Haughn_Kevin.jpg
