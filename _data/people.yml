affiliates:
  - name: "Dr. Christina Harvey"
    role: "Affiliate Researcher"
    institution: "University of California Davis"
    bio: >-
      I study how, when, and why animals adjust their morphology in flight. My research aims to inspire highly 
      maneuverable and adaptable uncrewed aerial vehicles (UAVs) and to advance our understanding of biological flight. 
      The work integrates biological and engineering knowledge and techniques.
    photo: /assets/images/people/Harvey_Christina.jpg
    email: "harvey@ucdavis.edu"
    joined: 2023
    orcid: "https://orcid.org/0000-0002-2830-0844"
