pi:
  - name: "Dr. Kevin PT Haughn"
    role: "Principal Investigator"
    bio: >-
      Hi, I'm Dr. Kevin Haughn. I'm an Assistant Professor of Mechanical Engineering at Rose-Hulman Institute of Technology. 
      I'm interested in how nature has learned to solve complex problems and am curious about how we can use those solutions
      in our own robotic designs. I'm particularly interested in morphology and maneuverability and believe it is through 
      holistic investigation of multidisciplinary sense -> compute -> adapt systems that can lead to the most valuable results.
    photo: /assets/images/people/Haughn_Kevin.jpg
    email: "haughn@rose-hulman.edu"
    orcid: "https://orcid.org/0000-0002-8219-8983"
    scholar: "https://scholar.google.com/citations?user=waDZzkAAAAAJ&hl=en"
    faculty: "https://www.rose-hulman.edu/academics/faculty/haughn-kevin-haughn.html"
    website: "https://haughn-morph-lab.github.io/morph-lab.github.io"

