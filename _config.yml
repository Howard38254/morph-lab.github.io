title: "MORPH Lab"
subtitle: "Mechanics Of Reconfigurable Platform Heuristics"
description: >-
  We are a group of researchers interested in how biology can inform the design of intelligent engineered platforms
  through exploring the interconnectivity of sensing, control, and morphology in natural systems.
url: "https://haughn-morph-lab.github.io"
baseurl: "/morph-lab.github.io"
repository: "haughn-morph-lab/morph-lab.github.io"

# Theme
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "contrast"


# Site Author (PI)
author:
  name: "Dr. Kevin PT Haughn"
  bio: "Mechanics Of Reconfigurable Platform Heuristics"
  location: "Rose-Hulman Institute of Technology, Terre Haute, IN"
  links:
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=waDZzkAAAAAJ&hl=en"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-8219-8983"

# Reading Files
include:
  - .htaccess
  - _pages

# Collections
collections:
  research:
    output: true
    permalink: /research/:name/
  showcase:
    output: true
    permalink: /showcase/:name/

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  # _research
  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: false
  # _showcase
  - scope:
      path: ""
      type: showcase
    values:
      layout: single
      author_profile: false
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Build Settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/New_York

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
